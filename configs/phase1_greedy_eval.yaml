# configs/phase1_greedy_eval.yaml
# Greedy-halt evaluation on the canonical Phase 1 best checkpoint.
#
# Purpose: measure per-example ACT segment usage under deterministic
# (greedy Q-halt) inference for the Phase 1 (PC-only) baseline.
# Comparison run for the compounding-inference-efficiency analysis.
#
# Checkpoint: phase1_canonical_seed0_best.pt (56.34% exact accuracy)
# Dataset:    canonical seed=0 Sudoku-Extreme-1K (full test set, no cap)

defaults:
  - phase1
  - _self_

# Warm-start from Phase 1 best checkpoint
resume_from_checkpoint: "/workspace/checkpoints/phase1_canonical_seed0_best.pt"

# Eval-only: 1 epoch, no weight updates
epochs: 1
eval_interval: 1
lr: 0.0
puzzle_emb_lr: 0.0

# Greedy halt: measure Q-halt-based segment usage
eval_halt_mode: greedy

# Full test set — no subsampling
eval_max_examples: null

run_name: "phase1_canonical_greedy_eval"
