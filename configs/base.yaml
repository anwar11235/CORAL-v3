# CORAL v3 base training config
# Override any field on the command line: python scripts/train.py data_path=... lr=7e-5

# Data
data_path: ???                 # Required: path to dataset directory
global_batch_size: 384
epochs: 20000
eval_interval: 2000

# Model
hidden_size: 512
num_heads: 8
expansion: 4.0
H_cycles: 2
L_cycles: 2
H_layers: 4
L_layers: 4
puzzle_emb_ndim: 512           # 0 = no puzzle embedding
pos_encodings: rope
rope_theta: 10000.0
rms_norm_eps: 1.0e-5
halt_max_steps: 16
halt_exploration_prob: 0.1
forward_dtype: bfloat16

# Loss
loss_type: stablemax_cross_entropy   # or softmax_cross_entropy

# Optimizer
lr: 7.0e-5
lr_min_ratio: 0.1
lr_warmup_steps: 1000
weight_decay: 1.0
beta1: 0.9
beta2: 0.95

# Puzzle embedding optimizer
puzzle_emb_lr: 1.0e-3
puzzle_emb_weight_decay: 0.1

# Run management
seed: 0
project_name: null             # W&B project name (auto-generated if null)
run_name: null                 # W&B run name (auto-generated if null)
checkpoint_path: null          # Save checkpoints here (auto-generated if null)
checkpoint_every_eval: false
eval_save_outputs: []
