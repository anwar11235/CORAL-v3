# Phase 3c: L_lb Option Y — non-normalized KL over all K+1 experts.
# Branched from moe-codebook-design @ 511793d; same hyperparameters as satisfied-owl
# (Phase 3b run) for direct comparability. Only change: L_lb formula (code-level).

# --- Data (required at launch time) ---
data_path: ???

# --- Architecture ---
hidden_size: 512
num_heads: 8
expansion: 4.0
H_cycles: 2
L_cycles: 2
H_layers: 4
L_layers: 4
halt_max_steps: 16
halt_exploration_prob: 0.1
pos_encodings: rope
rope_theta: 10000.0
rms_norm_eps: 1.0e-5
forward_dtype: bfloat16
puzzle_emb_ndim: 512

# --- Mechanism flags ---
use_predictive_coding: true
use_columnar_routing: false
use_crystallization: true

# --- PC weights (match poetic-giraffe / jovial-avocet) ---
lambda_pred: 0.1
lambda_pi: 0.01

# --- Soft MoE Crystallization ---
codebook_size: 256              # kept for CrystallizationBuffer key-space compat
crystal_proj_dim: 128           # proj_h / proj_l output dim; key_dim = 256
crystal_buffer_capacity: 10000  # spatial_buffer size; ~1.65 GB CPU RAM at default
crystal_bootstrap_steps: 5000   # steps before first k-means consolidation
crystal_consolidation_interval: 5000  # only first consolidation is needed; set > total_steps to disable repeats
moe_num_modes: 32               # K_modes — spatial codebook experts (disambiguation K=32)
lambda_moe_recon: 0.1           # weight for unweighted reconstruction loss (L_recon)
lambda_moe_balance: 0.01        # weight for codebook load-balancing KL loss (L_lb)

# --- Optimizer & schedule (match poetic-giraffe / jovial-avocet) ---
lr: 7.0e-5
puzzle_emb_lr: 7.0e-5
weight_decay: 1.0
puzzle_emb_weight_decay: 1.0
beta1: 0.9
beta2: 0.95
loss_type: stablemax_cross_entropy
lr_warmup_steps: 1000
lr_min_ratio: 0.1

# --- Training length ---
global_batch_size: 384
epochs: 20000
eval_interval: 2000
# Eval subsampling (Fix D): evaluate on first 10K test examples per call instead of
# the full ~300K augmented test set.  Reduces per-eval time from ~14 min to ~30 sec.
# Full evaluation (all augmented variants) is out-of-scope for this config; run
# separately on the final checkpoint if exact full-set metrics are needed.
eval_max_examples: 10000

# --- Warm-start ---
# Upload phase1_best_checkpoint_61pct.pt to /workspace/checkpoints/ before launching.
resume_from_checkpoint: "/workspace/checkpoints/phase1_best_checkpoint_61pct.pt"

# --- Run management ---
seed: 42
project_name: null   # auto: "Sudoku-extreme-1k-aug-1000 CORAL-v3"
run_name: null       # auto-generated coolname for Phase 3c run
checkpoint_path: null
checkpoint_every_eval: false
eval_save_outputs: []
